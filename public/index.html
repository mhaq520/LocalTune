<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐播放器</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/detail.css">
</head>
<body>
  <!-- ========== 网格视图 ========== -->
  <div id="gridView">
    <header>
      <h1>音乐播放器</h1>
      <div class="header-actions">
        <span id="projectCount" class="count"></span>
        <button id="refreshBtn" class="btn-refresh" title="刷新列表">刷新</button>
      </div>
    </header>
    <main id="projectGrid" class="grid">
      <div class="loading">正在扫描音乐目录...</div>
    </main>
  </div>

  <!-- ========== 详情视图 ========== -->
  <div id="detailView" class="hidden">
    <header>
      <button id="backBtn" class="btn-back">返回</button>
      <div class="header-info">
        <h1 id="projectTitle">加载中...</h1>
        <span id="projectSubtitle" class="subtitle"></span>
      </div>
    </header>

    <!-- 面包屑导航 -->
    <div id="breadcrumb" class="breadcrumb">
      <span class="breadcrumb-item active" data-path="">根目录</span>
    </div>

    <!-- 文件列表 -->
    <main id="fileList" class="file-list">
      <div class="loading">加载中...</div>
    </main>
  </div>

  <!-- ========== 底部播放条（两个视图共享） ========== -->
  <div id="playerBar" class="player-bar">
    <div class="player-progress-container">
      <span id="currentTime" class="time">00:00</span>
      <div class="progress-bar-wrapper">
        <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="0.1">
      </div>
      <span id="duration" class="time">00:00</span>
    </div>
    <div class="player-controls">
      <div class="song-info">
        <span id="nowPlaying" class="now-playing">未选择歌曲</span>
      </div>
      <div class="controls">
        <button id="prevBtn" class="btn-ctrl" title="上一首">&#9664;&#9664;</button>
        <button id="playBtn" class="btn-ctrl btn-play" title="播放/暂停">&#9654;</button>
        <button id="nextBtn" class="btn-ctrl" title="下一首">&#9654;&#9654;</button>
        <button id="lyricsToggleBtn" class="btn-ctrl" title="歌词">词</button>
      </div>
      <div class="volume-control">
        <button id="miniBtn" class="btn-ctrl" title="迷你模式">&#9641;</button>
        <span class="volume-icon">&#9834;</span>
        <input type="range" id="volumeBar" class="volume-bar" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <!-- 迷你播放器 -->
  <div id="miniPlayer" class="mini-player hidden">
    <span id="miniSongName" class="mini-song">未播放</span>
    <button id="miniPlayBtn" class="btn-mini-play">&#9654;</button>
    <button id="miniExpandBtn" class="btn-mini-expand">&#9650;</button>
  </div>

  <!-- 歌词弹窗 -->
  <div id="lyricsOverlay" class="lyrics-overlay hidden">
    <div id="lyricsBox" class="lyrics-box">
      <div class="lyrics-header">
        <span>歌词</span>
        <button id="lyricsCloseBtn" class="btn-close">✕</button>
      </div>
      <div id="lyricsContent" class="lyrics-content">
        <p class="no-lyrics">暂无歌词</p>
      </div>
    </div>
  </div>

  <script src="/js/player.js?v=2"></script>
  <script src="/js/lyrics.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
